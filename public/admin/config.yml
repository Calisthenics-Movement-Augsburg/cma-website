local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "home_hero"
    label: "Startseite: Hero"
    files:
      - label: "Hero"
        name: "hero"
        file: "src/content/home-hero/index.md"
        fields:
          - label: "Hintergrundbild"
            name: "backgroundImage"
            widget: "image"
            required: true

          - label: "Video Poster"
            name: "posterImage"
            widget: "image"
            required: true

          - label: "Video URL"
            name: "videoUrl"
            widget: "file"
            required: false
            media_folder: "/public/videos"
            public_folder: "/videos"

          - label: "Bildbeschreibung"
            name: "backgroundAlt"
            widget: "string"

          - label: "Logo"
            name: "logo"
            widget: "object"
            fields:
              - label: "Logo Datei"
                name: "src"
                widget: "image"

              - label: "Alt Text"
                name: "alt"
                widget: "string"

              - label: "Breite"
                name: "width"
                widget: "number"
                value_type: "int"
                default: 300

              - label: "Höhe"
                name: "height"
                widget: "number"
                value_type: "int"
                default: 300

  - name: "home_intro"
    label: "Startseite: Intro"
    files:
      - label: "Intro"
        name: "intro"
        file: "src/content/home-intro/index.md"
        fields:

          - label: "Titel Anfang"
            name: "titleStart"
            widget: "string"

          - label: "Titel Hervorhebung"
            name: "titleHighlight"
            widget: "string"

          - label: "Tagline"
            name: "tagline"
            widget: "text"

          - label: "Unterzeile"
            name: "subline"
            widget: "text"

  - name: "home_gallery"
    label: "Startseite: Galerie"
    files:
      - label: "Galerie"
        name: "gallery"
        file: "src/content/home-gallery/index.md"
        fields:
          - label: "Überschrift"
            name: "title"
            widget: "string"

          - label: "ARIA Label"
            name: "ariaLabel"
            widget: "string"

          - label: "Bilder"
            name: "images"
            widget: "list"
            fields:
              - label: "Bild"
                name: "src"
                widget: "image"
                media_folder: "public/gallery"
                public_folder: "/gallery"

              - label: "Alt Text"
                name: "alt"
                widget: "string"

  - name: "home_training_info"
    label: "Startseite: Trainingsinfo"
    files:
      - label: "Trainingsinfo"
        name: "training_info"
        file: "src/content/home-training-info/index.md"
        fields:
          - label: "Überschrift"
            name: "title"
            widget: "string"

          - label: "Einleitung"
            name: "intro"
            widget: "text"

          - label: "Trainingsbereiche"
            name: "trainingCards"
            widget: "list"
            fields:
              - label: "Titel"
                name: "title"
                widget: "string"
              - label: "Text"
                name: "text"
                widget: "text"

          - label: "Für wen geeignet?"
            name: "audience"
            widget: "object"
            fields:
              - label: "Titel"
                name: "title"
                widget: "string"
              - label: "Text"
                name: "text"
                widget: "text"

          - label: "Mitbringen"
            name: "bring"
            widget: "object"
            fields:
              - label: "Titel"
                name: "title"
                widget: "string"
              - label: "Liste"
                name: "items"
                widget: "list"
                field:
                  label: "Eintrag"
                  name: "item"
                  widget: "string"

          - label: "Trainingsort"
            name: "location"
            widget: "object"
            fields:
              - label: "Titel"
                name: "title"
                widget: "string"

              - label: "Adresse Label"
                name: "addressLabel"
                widget: "string"

              - label: "Adresse"
                name: "address"
                widget: "text"

              - label: "Zugang Label"
                name: "accessLabel"
                widget: "string"

              - label: "Zugang"
                name: "access"
                widget: "text"

              - label: "Parken / ÖPNV Label"
                name: "transportLabel"
                widget: "string"

              - label: "Parken / ÖPNV"
                name: "transport"
                widget: "text"

              - label: "Karten-Adresse"
                name: "mapAddress"
                widget: "string"

              - label: "Google Maps URL"
                name: "mapsUrl"
                widget: "string"

          - label: "CTA"
            name: "cta"
            widget: "object"
            fields:
              - label: "Titel"
                name: "title"
                widget: "string"

              - label: "Text"
                name: "text"
                widget: "text"

              - label: "Button Text"
                name: "label"
                widget: "string"

              - label: "Button Link"
                name: "href"
                widget: "string"

  - name: "home_timetable"
    label: "Startseite: Trainingszeiten"
    files:
      - label: "Trainingszeiten"
        name: "timetable"
        file: "src/content/home-timetable/index.md"
        fields:
          - label: "Überschrift"
            name: "title"
            widget: "string"

          - label: "Trainingstage"
            name: "days"
            widget: "list"
            fields:
              - label: "Anzeigetext"
                name: "dateLabel"
                widget: "string"

              - label: "Wochentag"
                name: "weekday"
                widget: "select"
                options:
                  - { label: "Montag", value: "monday" }
                  - { label: "Dienstag", value: "tuesday" }
                  - { label: "Mittwoch", value: "wednesday" }
                  - { label: "Donnerstag", value: "thursday" }
                  - { label: "Freitag", value: "friday" }
                  - { label: "Samstag", value: "saturday" }
                  - { label: "Sonntag", value: "sunday" }

              - label: "Einheiten"
                name: "slots"
                widget: "list"
                fields:
                  - label: "Titel"
                    name: "title"
                    widget: "string"

                  - label: "Uhrzeit"
                    name: "time"
                    widget: "string"

                  - label: "Trainer"
                    name: "trainer"
                    widget: "string"

                  - label: "Anmeldungen"
                    name: "booked"
                    widget: "number"
                    value_type: "int"

                  - label: "Maximale Plätze"
                    name: "max"
                    widget: "number"
                    value_type: "int"

          - label: "CTA"
            name: "cta"
            widget: "object"
            fields:
              - label: "Button Text"
                name: "label"
                widget: "string"

              - label: "Button Link"
                name: "href"
                widget: "string"

  - name: "home_contact_form"
    label: "Startseite: Kontaktformular"
    files:
      - label: "Kontaktformular"
        name: "contact_form"
        file: "src/content/home-contact-form/index.md"
        fields:
          - label: "Überschrift"
            name: "title"
            widget: "string"

          - label: "Einleitung"
            name: "intro"
            widget: "text"

          - label: "Altersoptionen"
            name: "ageOptions"
            widget: "list"
            field:
              label: "Option"
              name: "option"
              widget: "string"

          - label: "Trainingstage"
            name: "trainingDays"
            widget: "list"
            field:
              label: "Trainingstag"
              name: "day"
              widget: "string"

          - label: "Trainingserfahrung"
            name: "experienceOptions"
            widget: "list"
            field:
              label: "Option"
              name: "option"
              widget: "string"

          - label: "Nachricht Placeholder"
            name: "messagePlaceholder"
            widget: "string"

          - label: "Datenschutz"
            name: "privacy"
            widget: "object"
            fields:
              - label: "Text vor Link"
                name: "textBefore"
                widget: "text"

              - label: "Link Text"
                name: "linkLabel"
                widget: "string"

              - label: "Link"
                name: "href"
                widget: "string"

          - label: "Hinweistext"
            name: "note"
            widget: "text"

          - label: "Absenden Button"
            name: "submitLabel"
            widget: "string"

          - label: "Download Button"
            name: "download"
            widget: "object"
            fields:
              - label: "Button Text"
                name: "label"
                widget: "string"

              - label: "Datei"
                name: "href"
                widget: "file"
                media_folder: "public/downloads"
                public_folder: "/downloads"

  - name: "pricing"
    label: "Mitgliedsbeiträge"
    folder: "src/content/pricing"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Name"
        name: "name"
        widget: "string"

      - label: "Tagline"
        name: "tagline"
        widget: "string"

      - label: "Beschreibung"
        name: "description"
        widget: "text"

      - label: "Features"
        name: "features"
        widget: "list"
        field:
          label: "Feature"
          name: "feature"
          widget: "string"

      - label: "Preisoptionen"
        name: "options"
        widget: "list"
        fields:
          - label: "Euro"
            name: "price"
            widget: "string"

          - label: "Cent"
            name: "cents"
            widget: "string"
            default: "00"

      - label: "Reihenfolge"
        name: "order"
        widget: "number"
        value_type: "int"

      - label: "Hervorheben"
        name: "highlight"
        widget: "boolean"
        default: false

  - name: "pricing_page"
    label: "Mitgliedsbeiträge: Seitentext"
    files:
      - label: "Beitragsbereich"
        name: "pricing_page"
        file: "src/content/pricing-page/index.md"
        fields:
          - label: "Überschrift"
            name: "title"
            widget: "string"

          - label: "Absätze"
            name: "paragraphs"
            widget: "list"
            field:
              label: "Absatz"
              name: "paragraph"
              widget: "text"

  - name: "downloads"
    label: "Downloads"
    folder: "src/content/downloads"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Beschreibung", name: "description", widget: "text" }
      - { label: "Format", name: "format", widget: "string", default: "PDF" }
      - { label: "Datei", name: "file", widget: "file" }
      - { label: "Reihenfolge", name: "order", widget: "number", value_type: "int" }

  - name: "faq"
    label: "FAQ"
    folder: "src/content/faq"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Frage"
        name: "question"
        widget: "string"

      - label: "Antwort"
        name: "answer"
        widget: "text"

      - label: "Spalte"
        name: "column"
        widget: "select"
        options:
          - { label: "Links", value: "left" }
          - { label: "Rechts", value: "right" }

      - label: "Reihenfolge"
        name: "order"
        widget: "number"
        value_type: "int"


  - name: "team"
    label: "Team"
    files:
      - label: "Team Seite"
        name: "team"
        file: "src/content/team/index.md"
        fields:
          - label: "Browser Titel"
            name: "layoutTitle"
            widget: "string"

          - label: "Hero Titel"
            name: "heroTitle"
            widget: "string"

          - label: "Abschnitt Überschrift"
            name: "sectionTitle"
            widget: "string"

          - label: "Teammitglieder"
            name: "members"
            widget: "list"
            fields:
              - label: "Name"
                name: "name"
                widget: "string"

              - label: "Rolle"
                name: "role"
                widget: "string"

              - label: "Bild"
                name: "image"
                widget: "image"
                media_folder: "public/uploads/team"
                public_folder: "/uploads/team"

              - label: "Alt Text"
                name: "alt"
                widget: "string"

          - label: "CTA"
            name: "cta"
            widget: "object"
            fields:
              - label: "Button Text"
                name: "label"
                widget: "string"

              - label: "Link"
                name: "href"
                widget: "string"

              - label: "Title Attribut"
                name: "title"
                widget: "string"
                required: false

              - label: "Externer Link"
                name: "external"
                widget: "boolean"
                default: true

  - name: "shared_section_background"
    label: "Global: Section Background"
    files:
      - label: "Section Background"
        name: "section_background"
        file: "src/content/shared-section-background/index.md"
        fields:
          - label: "Hintergrundbild"
            name: "image"
            widget: "image"
            required: true
            media_folder: "/public/uploads/backgrounds"
            public_folder: "/uploads/backgrounds"


  - name: "footer"
    label: "Global: Footer"
    files:
      - label: "Footer"
        name: "footer"
        file: "src/content/footer/index.md"
        fields:
          - label: "Verein"
            name: "brand"
            widget: "object"
            fields:
              - label: "Titel"
                name: "title"
                widget: "string"

              - label: "Beschreibung"
                name: "descriptionLines"
                widget: "list"
                field:
                  label: "Zeile"
                  name: "line"
                  widget: "string"

          - label: "Adresse"
            name: "address"
            widget: "object"
            fields:
              - label: "Name"
                name: "name"
                widget: "string"

              - label: "Adresszeilen"
                name: "lines"
                widget: "list"
                field:
                  label: "Zeile"
                  name: "line"
                  widget: "string"

              - label: "E-Mail"
                name: "email"
                widget: "string"

          - label: "Impressum Hinweis"
            name: "legalNotice"
            widget: "object"
            fields:
              - label: "Text vor Link"
                name: "before"
                widget: "text"

              - label: "Link Text"
                name: "linkLabel"
                widget: "string"

              - label: "Link"
                name: "href"
                widget: "string"

              - label: "Text nach Link"
                name: "after"
                widget: "string"

          - label: "Footer Navigation"
            name: "footerNavigation"
            widget: "object"
            fields:
              - label: "Titel"
                name: "title"
                widget: "string"

              - label: "ARIA Label"
                name: "ariaLabel"
                widget: "string"

              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - label: "Link"
                    name: "href"
                    widget: "string"

                  - label: "Text"
                    name: "label"
                    widget: "string"

          - label: "Rechtliches"
            name: "legalNavigation"
            widget: "object"
            fields:
              - label: "Titel"
                name: "title"
                widget: "string"

              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - label: "Link"
                    name: "href"
                    widget: "string"

                  - label: "Text"
                    name: "label"
                    widget: "string"

          - label: "Social"
            name: "social"
            widget: "object"
            fields:
              - label: "Titel"
                name: "title"
                widget: "string"

              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - label: "Link"
                    name: "href"
                    widget: "string"

                  - label: "Text"
                    name: "label"
                    widget: "string"

                  - label: "Externer Link"
                    name: "external"
                    widget: "boolean"
                    default: true

          - label: "Copyright"
            name: "copyright"
            widget: "object"
            fields:
              - label: "Name"
                name: "name"
                widget: "string"

              - label: "Text"
                name: "text"
                widget: "string"

          - label: "Credit"
            name: "credit"
            widget: "object"
            fields:
              - label: "Text vor Icon"
                name: "before"
                widget: "string"

              - label: "Text nach Icon"
                name: "after"
                widget: "string"                

  - name: "impressum"
    label: "Impressum"
    files:
      - label: "Impressum"
        name: "impressum"
        file: "src/content/impressum/index.md"
        fields:
          - label: "Browser Titel"
            name: "layoutTitle"
            widget: "string"

          - label: "Hero Titel"
            name: "heroTitle"
            widget: "string"

          - label: "Einleitung"
            name: "intro"
            widget: "text"

          - label: "Buttons"
            name: "buttons"
            widget: "list"
            fields:
              - label: "Text"
                name: "label"
                widget: "string"

              - label: "Link"
                name: "href"
                widget: "string"

              - label: "Variante"
                name: "variant"
                widget: "select"
                options:
                  - { label: "Primär", value: "primary" }
                  - { label: "Sekundär", value: "secondary" }

          - label: "Inhalt"
            name: "body"
            widget: "markdown"                