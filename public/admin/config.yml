local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "downloads"
    label: "Downloads"
    folder: "src/content/downloads"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Beschreibung", name: "description", widget: "text" }
      - { label: "Format", name: "format", widget: "string", default: "PDF" }
      - { label: "Datei", name: "file", widget: "file" }
      - { label: "Reihenfolge", name: "order", widget: "number", value_type: "int" }

  - name: "faq"
    label: "FAQ"
    folder: "src/content/faq"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Frage"
        name: "question"
        widget: "string"

      - label: "Antwort"
        name: "answer"
        widget: "text"

      - label: "Spalte"
        name: "column"
        widget: "select"
        options:
          - { label: "Links", value: "left" }
          - { label: "Rechts", value: "right" }

      - label: "Reihenfolge"
        name: "order"
        widget: "number"
        value_type: "int"

  - name: "home_hero"
    label: "Startseite: Hero"
    files:
      - label: "Hero"
        name: "hero"
        file: "src/content/home-hero/index.md"
        fields:
          - label: "Hintergrundbild"
            name: "backgroundImage"
            widget: "image"
            required: true

          - label: "Video Poster"
            name: "posterImage"
            widget: "image"
            required: true

          - label: "Video URL"
            name: "videoUrl"
            widget: "file"
            required: false
            media_folder: "/public/videos"
            public_folder: "/videos"

          - label: "Bildbeschreibung"
            name: "backgroundAlt"
            widget: "string"

          - label: "Logo"
            name: "logo"
            widget: "object"
            fields:
              - label: "Logo Datei"
                name: "src"
                widget: "image"

              - label: "Alt Text"
                name: "alt"
                widget: "string"

              - label: "Breite"
                name: "width"
                widget: "number"
                value_type: "int"
                default: 300

              - label: "Höhe"
                name: "height"
                widget: "number"
                value_type: "int"
                default: 300

  - name: "home_intro"
    label: "Startseite: Intro"
    files:
      - label: "Intro"
        name: "intro"
        file: "src/content/home-intro/index.md"
        fields:

          - label: "Titel Anfang"
            name: "titleStart"
            widget: "string"

          - label: "Titel Hervorhebung"
            name: "titleHighlight"
            widget: "string"

          - label: "Tagline"
            name: "tagline"
            widget: "text"

          - label: "Unterzeile"
            name: "subline"
            widget: "text"

  - name: "home_training_info"
    label: "Startseite: Trainingsinfo"
    files:
      - label: "Trainingsinfo"
        name: "training_info"
        file: "src/content/home-training-info/index.md"
        fields:
          - label: "Überschrift"
            name: "title"
            widget: "string"

          - label: "Einleitung"
            name: "intro"
            widget: "text"

          - label: "Trainingsbereiche"
            name: "trainingCards"
            widget: "list"
            fields:
              - label: "Titel"
                name: "title"
                widget: "string"
              - label: "Text"
                name: "text"
                widget: "text"

          - label: "Für wen geeignet?"
            name: "audience"
            widget: "object"
            fields:
              - label: "Titel"
                name: "title"
                widget: "string"
              - label: "Text"
                name: "text"
                widget: "text"

          - label: "Mitbringen"
            name: "bring"
            widget: "object"
            fields:
              - label: "Titel"
                name: "title"
                widget: "string"
              - label: "Liste"
                name: "items"
                widget: "list"
                field:
                  label: "Eintrag"
                  name: "item"
                  widget: "string"

          - label: "Trainingsort"
            name: "location"
            widget: "object"
            fields:
              - label: "Titel"
                name: "title"
                widget: "string"

              - label: "Adresse Label"
                name: "addressLabel"
                widget: "string"

              - label: "Adresse"
                name: "address"
                widget: "text"

              - label: "Zugang Label"
                name: "accessLabel"
                widget: "string"

              - label: "Zugang"
                name: "access"
                widget: "text"

              - label: "Parken / ÖPNV Label"
                name: "transportLabel"
                widget: "string"

              - label: "Parken / ÖPNV"
                name: "transport"
                widget: "text"

              - label: "Karten-Adresse"
                name: "mapAddress"
                widget: "string"

              - label: "Google Maps URL"
                name: "mapsUrl"
                widget: "string"

          - label: "CTA"
            name: "cta"
            widget: "object"
            fields:
              - label: "Titel"
                name: "title"
                widget: "string"

              - label: "Text"
                name: "text"
                widget: "text"

              - label: "Button Text"
                name: "label"
                widget: "string"

              - label: "Button Link"
                name: "href"
                widget: "string"

  - name: "home_timetable"
    label: "Startseite: Trainingszeiten"
    files:
      - label: "Trainingszeiten"
        name: "timetable"
        file: "src/content/home-timetable/index.md"
        fields:
          - label: "Überschrift"
            name: "title"
            widget: "string"

          - label: "Trainingstage"
            name: "days"
            widget: "list"
            fields:
              - label: "Anzeigetext"
                name: "dateLabel"
                widget: "string"

              - label: "Wochentag"
                name: "weekday"
                widget: "select"
                options:
                  - { label: "Montag", value: "monday" }
                  - { label: "Dienstag", value: "tuesday" }
                  - { label: "Mittwoch", value: "wednesday" }
                  - { label: "Donnerstag", value: "thursday" }
                  - { label: "Freitag", value: "friday" }
                  - { label: "Samstag", value: "saturday" }
                  - { label: "Sonntag", value: "sunday" }

              - label: "Einheiten"
                name: "slots"
                widget: "list"
                fields:
                  - label: "Titel"
                    name: "title"
                    widget: "string"

                  - label: "Uhrzeit"
                    name: "time"
                    widget: "string"

                  - label: "Trainer"
                    name: "trainer"
                    widget: "string"

                  - label: "Anmeldungen"
                    name: "booked"
                    widget: "number"
                    value_type: "int"

                  - label: "Maximale Plätze"
                    name: "max"
                    widget: "number"
                    value_type: "int"

          - label: "CTA"
            name: "cta"
            widget: "object"
            fields:
              - label: "Button Text"
                name: "label"
                widget: "string"

              - label: "Button Link"
                name: "href"
                widget: "string"

  - name: "pricing"
    label: "Mitgliedsbeiträge"
    folder: "src/content/pricing"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Name"
        name: "name"
        widget: "string"

      - label: "Tagline"
        name: "tagline"
        widget: "string"

      - label: "Beschreibung"
        name: "description"
        widget: "text"

      - label: "Features"
        name: "features"
        widget: "list"
        field:
          label: "Feature"
          name: "feature"
          widget: "string"

      - label: "Preisoptionen"
        name: "options"
        widget: "list"
        fields:
          - label: "Euro"
            name: "price"
            widget: "string"

          - label: "Cent"
            name: "cents"
            widget: "string"
            default: "00"

      - label: "Reihenfolge"
        name: "order"
        widget: "number"
        value_type: "int"

      - label: "Hervorheben"
        name: "highlight"
        widget: "boolean"
        default: false

  - name: "pricing_page"
    label: "Mitgliedsbeiträge: Seitentext"
    files:
      - label: "Beitragsbereich"
        name: "pricing_page"
        file: "src/content/pricing-page/index.md"
        fields:
          - label: "Überschrift"
            name: "title"
            widget: "string"

          - label: "Absätze"
            name: "paragraphs"
            widget: "list"
            field:
              label: "Absatz"
              name: "paragraph"
              widget: "text"

  - name: "shared_section_background"
    label: "Global: Section Background"
    files:
      - label: "Section Background"
        name: "section_background"
        file: "src/content/shared-section-background/index.md"
        fields:
          - label: "Hintergrundbild"
            name: "image"
            widget: "image"
            required: true
            media_folder: "/public/uploads/backgrounds"
            public_folder: "/uploads/backgrounds"

