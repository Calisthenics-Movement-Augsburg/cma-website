local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "downloads"
    label: "Downloads"
    folder: "src/content/downloads"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Beschreibung", name: "description", widget: "text" }
      - { label: "Format", name: "format", widget: "string", default: "PDF" }
      - { label: "Datei", name: "file", widget: "file" }
      - { label: "Reihenfolge", name: "order", widget: "number", value_type: "int" }

  - name: "faq"
    label: "FAQ"
    folder: "src/content/faq"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Frage"
        name: "question"
        widget: "string"

      - label: "Antwort"
        name: "answer"
        widget: "text"

      - label: "Spalte"
        name: "column"
        widget: "select"
        options:
          - { label: "Links", value: "left" }
          - { label: "Rechts", value: "right" }

      - label: "Reihenfolge"
        name: "order"
        widget: "number"
        value_type: "int"

  - name: "home_hero"
    label: "Startseite: Hero"
    files:
      - label: "Hero"
        name: "hero"
        file: "src/content/home-hero/index.md"
        fields:
          - label: "Hintergrundbild"
            name: "backgroundImage"
            widget: "image"
            required: true

          - label: "Video Poster"
            name: "posterImage"
            widget: "image"
            required: true

          - label: "Video URL"
            name: "videoUrl"
            widget: "file"
            required: false
            media_folder: "/public/videos"
            public_folder: "/videos"

          - label: "Bildbeschreibung"
            name: "backgroundAlt"
            widget: "string"

          - label: "Logo"
            name: "logo"
            widget: "object"
            fields:
              - label: "Logo Datei"
                name: "src"
                widget: "image"

              - label: "Alt Text"
                name: "alt"
                widget: "string"

              - label: "Breite"
                name: "width"
                widget: "number"
                value_type: "int"
                default: 300

              - label: "Höhe"
                name: "height"
                widget: "number"
                value_type: "int"
                default: 300

  - name: "pricing"
    label: "Mitgliedsbeiträge"
    folder: "src/content/pricing"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Name"
        name: "name"
        widget: "string"

      - label: "Tagline"
        name: "tagline"
        widget: "string"

      - label: "Beschreibung"
        name: "description"
        widget: "text"

      - label: "Features"
        name: "features"
        widget: "list"
        field:
          label: "Feature"
          name: "feature"
          widget: "string"

      - label: "Preisoptionen"
        name: "options"
        widget: "list"
        fields:
          - label: "Euro"
            name: "price"
            widget: "string"

          - label: "Cent"
            name: "cents"
            widget: "string"
            default: "00"

      - label: "Reihenfolge"
        name: "order"
        widget: "number"
        value_type: "int"

      - label: "Hervorheben"
        name: "highlight"
        widget: "boolean"
        default: false

  - name: "pricing_page"
    label: "Mitgliedsbeiträge: Seitentext"
    files:
      - label: "Beitragsbereich"
        name: "pricing_page"
        file: "src/content/pricing-page/index.md"
        fields:
          - label: "Überschrift"
            name: "title"
            widget: "string"

          - label: "Absätze"
            name: "paragraphs"
            widget: "list"
            field:
              label: "Absatz"
              name: "paragraph"
              widget: "text"