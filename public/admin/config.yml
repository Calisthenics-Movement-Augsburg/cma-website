local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "downloads"
    label: "Downloads"
    folder: "src/content/downloads"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Beschreibung", name: "description", widget: "text" }
      - { label: "Format", name: "format", widget: "string", default: "PDF" }
      - { label: "Datei", name: "file", widget: "file" }
      - { label: "Reihenfolge", name: "order", widget: "number", value_type: "int" }

  - name: "faq"
    label: "FAQ"
    folder: "src/content/faq"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Frage"
        name: "question"
        widget: "string"

      - label: "Antwort"
        name: "answer"
        widget: "text"

      - label: "Spalte"
        name: "column"
        widget: "select"
        options:
          - { label: "Links", value: "left" }
          - { label: "Rechts", value: "right" }

      - label: "Reihenfolge"
        name: "order"
        widget: "number"
        value_type: "int"